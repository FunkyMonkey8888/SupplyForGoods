<div class="create-product-hero">

  <!-- overlay -->
  <div class="hero-overlay"></div>

  <!-- center container -->
  <div class="create-product-container">

    <div class="create-product-card animate-in">

      <!-- ICON -->
      <div class="icon-wrapper">
        <i class="bi bi-box-seam-fill"></i>
      </div>

      <h3 class="title">Create Product</h3>

      <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

        <!-- PRODUCT NAME -->
        <div class="form-group">
          <label>Product Name</label>
          <input
            type="text"
            class="custom-input"
            formControlName="name"
            placeholder="Enter product name"
          />
          <small class="error-text"
                 *ngIf="itemForm.get('name')?.touched && itemForm.get('name')?.invalid">
            Product name is required
          </small>
        </div>

        <!-- DESCRIPTION -->
        <div class="form-group">
          <label>Description</label>
          <input
            type="text"
            class="custom-input"
            formControlName="description"
            placeholder="Enter description"
          />
        </div>

        <!-- PRICE -->
        <div class="form-group">
          <label>Price (₹)</label>
          <input
            type="number"
            class="custom-input"
            formControlName="price"
            placeholder="Enter price"
          />
          <small class="error-text"
                 *ngIf="itemForm.get('price')?.touched && itemForm.get('price')?.invalid">
            Enter a valid price
          </small>
        </div>

        <!-- STOCK -->
        <div class="form-group">
          <label>Stock Quantity</label>
          <input
            type="number"
            class="custom-input"
            formControlName="stockQuantity"
            placeholder="Enter initial stock"
          />
          <small class="error-text"
                 *ngIf="itemForm.get('stockQuantity')?.touched && itemForm.get('stockQuantity')?.invalid">
            Stock quantity must be greater than 0
          </small>
        </div>

        <!-- API ERROR -->
        <div *ngIf="message" class="error-box">
          {{ message }}
        </div>

        <!-- SUBMIT -->
        <button
          class="submit-btn"
          type="submit"
          [disabled]="itemForm.invalid">
          <i class="bi bi-plus-circle me-2"></i>
          Create Product
        </button>

      </form>

    </div>

  </div>

</div>
