<!-- ===================== NAVBAR ===================== -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm px-3">
  <div class="container-fluid">

    <!-- Brand -->
    <a class="navbar-brand fw-semibold" routerLink="/dashboard">
      Supply For Goods Management Platform
    </a>

    <!-- Mobile Toggle -->
    <button
      class="navbar-toggler"
      type="button"
      (click)="isMenuOpen = !isMenuOpen">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar Content -->
    <div class="collapse navbar-collapse" [class.show]="isMenuOpen">

      <!-- ================= LEFT: ROLE‑BASED LINKS ================= -->
      <ul class="navbar-nav me-auto" *ngIf="IsLoggin">

        <!-- MANUFACTURER -->
        <li class="nav-item" *ngIf="roleName === 'MANUFACTURER'">
          <a class="nav-link" routerLink="/create-product">
            Create Products
          </a>
        </li>

        <!-- WHOLESALER -->
        <li class="nav-item" *ngIf="roleName === 'WHOLESALER'">
          <a class="nav-link" routerLink="/get-orders">
            Get Orders
          </a>
        </li>

        <li class="nav-item" *ngIf="roleName === 'WHOLESALER'">
          <a class="nav-link" routerLink="/place-product">
            Place Order
          </a>
        </li>

        <li class="nav-item" *ngIf="roleName === 'WHOLESALER'">
          <a class="nav-link" routerLink="/add-inventory">
            Add Inventory
          </a>
        </li>

        <!-- CONSUMER -->
        <li class="nav-item" *ngIf="roleName === 'CONSUMER'">
          <a class="nav-link" routerLink="/consumer-place-order">
            Place Order
          </a>
        </li>

        <li class="nav-item" *ngIf="roleName === 'CONSUMER'">
          <a class="nav-link" routerLink="/consumer-get-orders">
            My Orders
          </a>
        </li>

      </ul>

      <!-- ================= RIGHT: AUTH / USER DROPDOWN ================= -->
      <ul class="navbar-nav align-items-center">

        <!-- Login -->
        <li class="nav-item" *ngIf="!IsLoggin">
          <a class="nav-link" routerLink="/login">Login</a>
        </li>

        <!-- Logged‑in Dropdown -->
        <li class="nav-item dropdown position-relative" *ngIf="IsLoggin">

          <!-- Trigger -->
          <a class="nav-link fw-semibold"
             href="#"
             (click)="toggleMenu($event)">
            {{ roleName }} ▾
          </a>

          <!-- Dropdown Menu -->
          <div class="dropdown-menu dropdown-menu-end show"
               *ngIf="showMenu"
               style="position: absolute; right: 0; top: 100%;">

            <button class="dropdown-item text-danger"
                    (click)="logout(); showMenu = false">
              Logout
            </button>

          </div>
        </li>

      </ul>
    </div>
  </div>
</nav>

<!-- ===================== MAIN CONTENT ===================== -->
<main class="container-fluid mt-4 px-4">
  <router-outlet></router-outlet>
</main>
