<nav class="navbar navbar-expand-lg navbar-dark app-navbar shadow-sm px-3">
  <div class="container-fluid">

    <!-- Brand -->
    <a class="navbar-brand app-brand d-flex align-items-center" routerLink="/dashboard">
      <i class="bi bi-box-seam-fill me-2" style="font-size: 1.4rem; color: #77b5ff;"></i>
      SupplyChain Pro
    </a>

    <!-- Mobile Toggle -->
    <button class="navbar-toggler"
            type="button"
            (click)="isMenuOpen = !isMenuOpen">
      <span class="navbar-toggler-icon"></span>
    </button>

    <!-- Navbar Content -->
    <div class="collapse navbar-collapse" [class.show]="isMenuOpen">

      <!-- LEFT: Role links -->
      <ul class="navbar-nav me-auto app-nav-links" *ngIf="IsLoggin">

        <!-- MANUFACTURER -->
        <li class="nav-item" *ngIf="role === 'MANUFACTURER'">
          <a class="nav-link" routerLink="/create-product">
            <i class="bi bi-plus-circle me-1"></i> Create Product
          </a>
        </li>

        <li class="nav-item" *ngIf="role === 'MANUFACTURER'">
          <a class="nav-link" routerLink="/get-orders">
            <i class="bi bi-receipt me-1"></i> Review Orders
          </a>
        </li>
        <li class="nav-item" *ngIf="role === 'MANUFACTURER'">
          <a class="nav-link" routerLink="/view-products">
            <i class="bi bi-receipt me-1"></i> View Products
          </a>
        </li>

        <!-- WHOLESALER -->
        <li class="nav-item" *ngIf="role === 'WHOLESALER'">
          <a class="nav-link" routerLink="/add-inventory">
            <i class="bi bi-stack me-1"></i> Add Inventory
          </a>
        </li>

        <li class="nav-item" *ngIf="role === 'WHOLESALER'">
          <a class="nav-link" routerLink="/place-product">
            <i class="bi bi-cart-check me-1"></i> Place Order
          </a>
        </li>

        <li class="nav-item" *ngIf="role === 'WHOLESALER'">
          <a class="nav-link" routerLink="/get-orders">
            <i class="bi bi-truck me-1"></i> My Orders
          </a>
        </li>

        <!-- CONSUMER -->
        <li class="nav-item" *ngIf="role === 'CONSUMER'">
          <a class="nav-link" routerLink="/consumer-place-order">
            <i class="bi bi-bag-check me-1"></i> Browse Products
          </a>
        </li>

        <li class="nav-item" *ngIf="role === 'CONSUMER'">
          <a class="nav-link" routerLink="/consumer-get-orders">
            <i class="bi bi-clock-history me-1"></i> My Orders
          </a>
        </li>
      </ul>

      <!-- RIGHT: Notifications + Auth -->
      <ul class="navbar-nav align-items-center ms-auto app-nav-auth">

        <!-- Register -->
        <li class="nav-item" *ngIf="!IsLoggin">
          <a class="auth-btn btn me-2" routerLink="/registration">Get Started</a>
        </li>

        <!-- Login -->
        <li class="nav-item" *ngIf="!IsLoggin">
          <a class="nav-link" routerLink="/login">Login</a>
        </li>

        <!-- Notifications -->
        <li class="nav-item position-relative me-2" *ngIf="IsLoggin">
          <button class="btn btn-dark position-relative"
                  type="button"
                  (click)="toggleNotifications()">
            <i class="bi bi-bell"></i>

            <span *ngIf="notifications.length"
                  class="badge bg-danger position-absolute top-0 start-100 translate-middle">
              {{ notifications.length }}
            </span>
          </button>

          <div *ngIf="showNotifications"
               class="card shadow-sm p-3 position-absolute"
               style="right: 0; top: 42px; width: 320px; z-index: 6000;">
            <h6 class="mb-2">Notifications</h6>

            <div *ngIf="notifications.length === 0" class="text-muted">
              No new notifications.
            </div>

            <div *ngFor="let n of notifications" class="border-bottom py-2">
              <div class="fw-semibold">{{ n.title }}</div>
              <div class="text-muted small">{{ n.message }}</div>

              <button class="btn btn-sm btn-link px-0"
                      type="button"
                      (click)="markRead(n.id)">
                Mark as read
              </button>
            </div>
          </div>
        </li>

        <!-- Role + Logout dropdown -->
        <li class="nav-item dropdown" *ngIf="IsLoggin">
          <a class="nav-link fw-semibold d-flex align-items-center"
             href="#"
             (click)="toggleMenu($event)">
            <i class="bi bi-person-circle me-1"></i>
            {{ role }}
          </a>

          <div class="dropdown-menu dropdown-menu-end show" *ngIf="showMenu">
            <button class="dropdown-item text-danger"
                    type="button"
                    (click)="logout(); showMenu = false">
              <i class="bi bi-box-arrow-right me-1"></i>
              Logout
            </button>
          </div>
        </li>

      </ul>
    </div>
  </div>
</nav>

<main class="container-fluid px-4 app-main">
  <router-outlet></router-outlet>
</main>
