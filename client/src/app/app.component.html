<nav class="navbar navbar-expand-lg app-navbar app-navbar-lg px-4">
  <a class="navbar-brand app-brand" routerLink="/">
    Supply‑of‑Goods
  </a>

  <button
    class="navbar-toggler"
    type="button"
    (click)="isMenuOpen = !isMenuOpen">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" [class.show]="isMenuOpen">

    <ul class="navbar-nav me-auto app-nav-links">

      <li class="nav-item" *ngIf="role === 'MANUFACTURER'">
        <a class="nav-link" [routerLink]="['/create-product']">Create Products</a>
      </li>

      <li class="nav-item" *ngIf="role === 'MANUFACTURER'">
        <a class="nav-link" [routerLink]="['/view-products']">View Products</a>
      </li>

      <li class="nav-item" *ngIf="role === 'MANUFACTURER'">
        <a class="nav-link" [routerLink]="['/get-orders']">Review Orders</a>
      </li>

      <li class="nav-item" *ngIf="role === 'WHOLESALER'">
        <a class="nav-link" [routerLink]="['/get-orders']">Get Orders</a>
      </li>

      <li class="nav-item" *ngIf="role === 'WHOLESALER'">
        <a class="nav-link" [routerLink]="['/place-product']">Place Order</a>
      </li>

      <li class="nav-item" *ngIf="role === 'WHOLESALER'">
        <a class="nav-link" [routerLink]="['/add-inventory']">Add Inventory</a>
      </li>

      <li class="nav-item" *ngIf="role === 'CONSUMER'">
        <a class="nav-link" [routerLink]="['/consumer-place-order']">Place Order</a>
      </li>

      <li class="nav-item" *ngIf="role === 'CONSUMER'">
        <a class="nav-link" [routerLink]="['/consumer-get-orders']">Orders</a>
      </li>

      <li class="nav-item" *ngIf="role === 'CONSUMER'">
          <a class="nav-link" [routerLink]="['/dashboard']" [queryParams]="{ panel: 'cart' }">
            Cart
          </a>
      </li>

    </ul>

    <ul class="navbar-nav app-nav-auth align-items-center">

      <!-- ✅ NOTIFICATION BUTTON (only when logged in) -->
      <li class="nav-item notif-wrap" *ngIf="IsLoggin">
        <button class="notif-btn" type="button" (click)="toggleNotifications()">
          <i class="bi bi-bell"></i>
          <span class="notif-badge" *ngIf="notifications.length">{{ notifications.length }}</span>
        </button>

        <!-- ✅ Notifications Panel -->
        <div class="notif-panel" *ngIf="showNotifications" (click)="$event.stopPropagation()">
          <div class="notif-head">
            <div class="notif-title">Notifications</div>
            <button class="notif-close" type="button" (click)="toggleNotifications()">✕</button>
          </div>

          <div class="notif-empty" *ngIf="notifications.length === 0">
            No new notifications.
          </div>

          <div class="notif-list" *ngIf="notifications.length > 0">
            <div class="notif-item" *ngFor="let n of notifications">
              <div class="notif-item-top">
                <div class="notif-item-title">{{ n.title }}</div>
                <button class="notif-mark" type="button" (click)="markRead(n.id)">
                  Mark read
                </button>
              </div>
              <div class="notif-item-msg">{{ n.message }}</div>
              <div class="notif-item-meta">
                <span *ngIf="n.createdAt">{{ n.createdAt | date:'medium' }}</span>
              </div>
            </div>
          </div>
        </div>
      </li>

      <!-- Login -->
      <li *ngIf="!IsLoggin" class="nav-item">
        <a class="nav-link auth-btn" [routerLink]="['/login']">Login</a>
      </li>

      <!-- Logout -->
      <li *ngIf="IsLoggin" class="nav-item">
        <a class="nav-link auth-btn logout"
           (click)="logout()"
           [routerLink]="['/login']">
          Logout
        </a>
      </li>

    </ul>
  </div>
</nav>

<main class="app-main">
  <router-outlet></router-outlet>
</main>
