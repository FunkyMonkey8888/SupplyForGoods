<div class="order-container"
     style="font-family: 'Poppins', sans-serif; padding: 20px; max-width: 900px; margin: auto;">

  <!-- Page Title -->
  <h2 style="
      font-weight: 700;
      text-align: center;
      margin-bottom: 25px;
      color: #2f3542;">
    Place Order
  </h2>

  <!-- Product List -->
  <div class="card"
       style="
         padding: 20px;
         border-radius: 15px;
         background: linear-gradient(135deg, #ffffff 0%, #f2f8ff 100%);
         box-shadow: 0 8px 20px rgba(0,0,0,0.08);
         margin-bottom: 30px;
       ">

    <h4 style="font-weight: 600; margin-bottom: 15px; color: #1e293b;">
      Available Products
    </h4>

    <table style="width: 100%; border-collapse: collapse; text-align: left;">
      <thead>
        <tr style="background: #2f3542; color: white;">
          <th style="padding: 12px;">Product Name</th>
          <th style="padding: 12px;">Price</th>
          <th style="padding: 12px;">Stock</th>
          <th style="padding: 12px;">Action</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let p of productList"
            style="transition: 0.2s;"
            onmouseover="this.style.background='#eef6ff'"
            onmouseout="this.style.background='transparent'">

          <td style="padding: 12px; font-weight: 500;">{{ p.name }}</td>
          <td style="padding: 12px;">₹{{ p.price }}</td>
          <td style="padding: 12px;">{{ p.stockQuantity }}</td>
          <td style="padding: 12px;">
            <button 
              (click)="addToOrder(p)"
              style="
                background: linear-gradient(90deg, #1e90ff, #00b4d8);
                border: none;
                padding: 8px 14px;
                color: white;
                font-size: 14px;
                border-radius: 8px;
                cursor: pointer;
                transition: 0.25s;">
              Select
            </button>
          </td>
        </tr>
      </tbody>
    </table>

  </div>

  <!-- Order Form -->
  <div class="card"
       style="
         padding: 20px;
         border-radius: 15px;
         background: linear-gradient(135deg, #ffffff 0%, #f7fcff 100%);
         box-shadow: 0 8px 20px rgba(0,0,0,0.08);
       ">

    <h4 style="font-weight: 600; color: #1e293b;">Order Details</h4>

    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

      <!-- Quantity -->
      <div class="form-group" style="margin-bottom: 16px;">
        <label style="font-weight: 600;">Quantity</label>
        <input type="number" formControlName="quantity"
               style="
                 width: 100%;
                 padding: 10px;
                 border-radius: 10px;
                 border: 1px solid #ccc;
                 margin-top: 5px;
                 height: 44px;">
        <small *ngIf="itemForm.get('quantity')?.touched && itemForm.get('quantity')?.invalid"
               style="color: red; font-size: 13px;">
          Quantity is required
        </small>
      </div>

      <!-- Status -->
      <div class="form-group" style="margin-bottom: 16px;">
        <label style="font-weight: 600;">Status</label>
        <input type="text" formControlName="status" readonly
               style="
                 width: 100%;
                 padding: 10px;
                 border-radius: 10px;
                 border: 1px solid #ccc;
                 margin-top: 5px;
                 height: 44px;">
      </div>

      <!-- SUCCESS MESSAGE -->
      <p class="success"
         *ngIf="showMessage"
         style="
           background: #d4edda;
           color: #155724;
           border-radius: 8px;
           padding: 10px;
           font-weight: 500;
           text-align: center;">
        {{ responseMessage }}
      </p>

      <!-- ERROR MESSAGE -->
      <p class="error"
         *ngIf="showError"
         style="
           background: #f8d7da;
           color: #721c24;
           border-radius: 8px;
           padding: 10px;
           font-weight: 500;
           text-align: center;">
        {{ errorMessage }}
      </p>

      <!-- Submit Button -->
      <button type="submit"
              style="
                width: 100%;
                background: linear-gradient(90deg, #2f80ed, #56ccf2);
                border: none;
                padding: 12px;
                border-radius: 10px;
                font-size: 17px;
                color: white;
                font-weight: 600;
                cursor: pointer;
                transition: 0.25s;"
              onmouseover="this.style.transform='scale(1.03)'"
              onmouseout="this.style.transform='scale(1)'">
        Place Order
      </button>

    </form>
  </div>

</div>
