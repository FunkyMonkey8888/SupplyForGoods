<!-- 🌟 Full Dashboard UI -->
<div class="container mt-5"
     style="max-width: 800px; font-family: 'Poppins', sans-serif;">

  <div class="card shadow-lg p-4"
       style="
         border-radius: 20px;
         background: linear-gradient(135deg, #ffffff 0%, #f1f7ff 100%);
         box-shadow: 0 10px 35px rgba(0, 0, 0, 0.12);
       ">

    <!-- Page Icon -->
    <div class="text-center mb-4">
      https://cdn-icons-png.flaticon.com/512/854/854878.png
    </div>

    <!-- Title -->
    <h2 class="text-center mb-2"
        style="font-weight: 700; color: #2f3542;">
      Welcome to the Supply‑of‑Goods Platform
    </h2>

    <p class="text-center text-muted mb-4"
       style="font-size: 15px;">
      Logged in as <b style="color:#2f80ed;">{{ role }}</b>
    </p>

    <hr style="opacity: 0.2;">

    <!-- ✅ MANUFACTURER SECTION -->
    <div *ngIf="role === 'MANUFACTURER'" class="mt-4">

      <h4 style="font-weight: 600; color: #1e293b;">
        Manufacturer Options
      </h4>

      <ul class="list-group my-3"
          style="border-radius: 14px; overflow: hidden;">

        <li class="list-group-item"
            style="cursor: pointer; transition: 0.2s;"
            onmouseover="this.style.background='#f1f7ff'"
            onmouseout="this.style.background='white'">
          <a routerLink="/create-product" class="text-decoration-none"
             style="color: #1e90ff; font-weight: 500;">
            ➤ Create Products
          </a>
        </li>

      </ul>
    </div>

    <!-- ✅ WHOLESALER SECTION -->
    <div *ngIf="role === 'WHOLESALER'" class="mt-4">

      <h4 style="font-weight: 600; color: #1e293b;">
        Wholesaler Options
      </h4>

      <ul class="list-group my-3"
          style="border-radius: 14px; overflow: hidden;">

        <li class="list-group-item"
            style="cursor: pointer; transition: 0.2s;"
            onmouseover="this.style.background='#eaf4ff'"
            onmouseout="this.style.background='white'">
          <a routerLink="/get-orders"
             class="text-decoration-none"
             style="color: #1e90ff; font-weight: 500;">
            ➤ View Orders
          </a>
        </li>

        <li class="list-group-item"
            style="cursor: pointer; transition: 0.2s;"
            onmouseover="this.style.background='#eaf4ff'"
            onmouseout="this.style.background='white'">
          <a routerLink="/place-product"
             class="text-decoration-none"
             style="color: #1e90ff; font-weight: 500;">
            ➤ Place Order
          </a>
        </li>

        <li class="list-group-item"
            style="cursor: pointer; transition: 0.2s;"
            onmouseover="this.style.background='#eaf4ff'"
            onmouseout="this.style.background='white'">
          <a routerLink="/add-inventory"
             class="text-decoration-none"
             style="color: #1e90ff; font-weight: 500;">
            ➤ Add Inventory
          </a>
        </li>

      </ul>
    </div>

    <!-- ✅ CONSUMER SECTION -->
    <div *ngIf="role === 'CONSUMER'" class="mt-4">

      <h4 style="font-weight: 600; color: #1e293b;">
        Consumer Options
      </h4>

      <ul class="list-group my-3"
          style="border-radius: 14px; overflow: hidden;">

        <li class="list-group-item"
            style="cursor: pointer; transition: 0.2s;"
            onmouseover="this.style.background='#fff3e8'"
            onmouseout="this.style.background='white'">
          <a routerLink="/consumer-place-order"
             class="text-decoration-none"
             style="color: #ff7f3f; font-weight: 500;">
            ➤ Place Order
          </a>
        </li>

        <li class="list-group-item"
            style="cursor: pointer; transition: 0.2s;"
            onmouseover="this.style.background='#fff3e8'"
            onmouseout="this.style.background='white'">
          <a routerLink="/consumer-get-orders"
             class="text-decoration-none"
             style="color: #ff7f3f; font-weight: 500;">
            ➤ View My Orders
          </a>
        </li>

      </ul>
    </div>

  </div>

</div>
