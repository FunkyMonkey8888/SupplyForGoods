<div class="dashboard-container">

  <h2>Dashboard</h2>
  <p class="role">Role: {{ role }}</p>

  <!-- MANUFACTURER DASHBOARD -->
  <div class="card-container" *ngIf="role === 'MANUFACTURER'">
    <div class="card" (click)="navigate('/create-product')">
      <h3>Create / Update Products</h3>
      <p>Manage your products</p>
    </div>
  </div>

  <!-- WHOLESALER DASHBOARD -->
  <div class="card-container" *ngIf="role === 'WHOLESALER'">
    <div class="card" (click)="navigate('/place-product')">
      <h3>Place Order</h3>
      <p>Order products from manufacturers</p>
    </div>

    <div class="card" (click)="navigate('/get-orders')">
      <h3>View Orders</h3>
      <p>Track and update order status</p>
    </div>

    <div class="card" (click)="navigate('/add-inventory')">
      <h3>Manage Inventory</h3>
      <p>Add or update stock</p>
    </div>
  </div>

  <!-- CONSUMER DASHBOARD -->
  <div class="card-container" *ngIf="role === 'CONSUMER'">
    <div class="card" (click)="navigate('/consumer-place-order')">
      <h3>Place Order</h3>
      <p>Buy products</p>
    </div>

    <div class="card" (click)="navigate('/consumer-get-orders')">
      <h3>My Orders</h3>
      <p>View orders and give feedback</p>
    </div>
  </div>

</div>
