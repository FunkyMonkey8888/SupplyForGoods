<div class="container py-4 consumer-orders">

  <!-- Header -->
  <div class="d-flex align-items-center mb-4">
    <img src="https://cdn-icons-png.flaticon.com/512/3500/3500833.png"
         width="40"
         class="me-2"
         alt="orders-icon">
    <h2 class="fw-bold mb-0">Your Orders</h2>
  </div>

  <!-- Error Message -->
  <div *ngIf="message"
       class="alert alert-danger">
    {{ message }}
  </div>

  <!-- Orders Table -->
  <div *ngIf="orders.length > 0"
       class="card shadow-sm">

    <table class="table align-middle mb-0">
      <thead class="table-dark">
        <tr>
          <th>Order ID</th>
          <th>Product</th>
          <th>Quantity</th>
          <th>Status</th>
          <th>Placed On</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let order of orders">
          <td>{{ order.id }}</td>

          <td>
            {{ order.product?.name || 'N/A' }}
          </td>

          <td>{{ order.quantity }}</td>

          <td>
            <span class="badge"
                  [ngClass]="{
                    'bg-success': order.status === 'CONFIRMED',
                    'bg-warning text-dark': order.status === 'PENDING' || order.status === 'PLACED',
                    'bg-primary': order.status === 'SHIPPED',
                    'bg-danger': order.status === 'CANCELLED'
                  }">
              {{ order.status }}
            </span>
          </td>

          <td>
            {{ formatDate(order.timestamp) || '-' }}
          </td>
        </tr>
      </tbody>
    </table>

  </div>

  <!-- No Orders -->
  <p *ngIf="orders.length === 0 && !message"
     class="text-muted text-center mt-4">
    You have not placed any orders yet.
  </p>

</div>
