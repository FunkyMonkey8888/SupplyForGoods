<div class="container py-4">

  <h2 class="fw-bold mb-4">Your Orders</h2>

  <table class="table table-bordered">
    <thead class="table-dark">
      <tr>
        <th>Order ID</th>
        <th>Product</th>
        <th>Quantity</th>
        <th>Status</th>
        <th>Feedback</th>
      </tr>
    </thead>

    <tbody>
      <ng-container *ngFor="let o of orders">

        <!-- Order Row -->
        <tr>
          <td>{{ o.id }}</td>
          <td>{{ o.product?.name }}</td>
          <td>{{ o.quantity }}</td>

          <td>
            <span class="badge bg-success" *ngIf="o.status === 'CONFIRMED'">
              CONFIRMED
            </span>
            <span class="badge bg-warning text-dark" *ngIf="o.status !== 'CONFIRMED'">
              {{ o.status }}
            </span>
          </td>

          <!-- Feedback column -->
          <td>

            <!-- ✅ If feedback already submitted → VIEW -->
            <div *ngIf="submittedFeedback[o.id]">

              <div class="mb-1">
                <i class="bi bi-star-fill me-1"
                   *ngFor="let s of [1,2,3,4,5]"
                   [class.text-warning]="submittedFeedback[o.id].rating >= s"
                   [class.text-muted]="submittedFeedback[o.id].rating < s">
                </i>
              </div>

              <small class="text-muted fst-italic">
                "{{ submittedFeedback[o.id].comment }}"
              </small>
            </div>

            <!-- ✅ Else → Give Feedback -->
            <button *ngIf="
                o.status === 'CONFIRMED' &&
                !submittedFeedback[o.id]
              "
              class="btn btn-sm btn-warning"
              (click)="openFeedback(o.id)">
              Give Feedback
            </button>
          </td>
        </tr>

        <!-- Feedback Form -->
        <tr *ngIf="activeOrderId === o.id">
          <td colspan="5">

            <div class="mb-2">
              <i class="bi bi-star-fill me-1"
                 *ngFor="let s of [1,2,3,4,5]"
                 (click)="setRating(o.id, s)"
                 [class.text-warning]="ratings[o.id] >= s"
                 [class.text-muted]="ratings[o.id] < s"
                 style="cursor:pointer;">
              </i>
            </div>

            <textarea class="form-control mb-2"
              rows="2"
              placeholder="Write your review..."
              [(ngModel)]="comments[o.id]"></textarea>

            <button class="btn btn-success btn-sm"
              (click)="submitFeedback(o.id)">
              Submit Feedback
            </button>

          </td>
        </tr>

      </ng-container>
    </tbody>

  </table>
</div>
