<div class="consumer-orders-hero">

  <div class="hero-overlay"></div>

  <div class="consumer-orders-container">

    <div class="orders-card animate-in">

      <div class="orders-header">
        <div class="icon-wrapper">
          <i class="bi bi-bag-check-fill"></i>
        </div>

        <h3>Your Orders</h3>
        <p>Track your orders and share feedback after confirmation</p>
      </div>

      <div *ngIf="orders.length === 0" class="empty-state">
        <i class="bi bi-inbox"></i>
        <p>No orders found yet.</p>
      </div>

      <div *ngIf="orders.length > 0" class="table-responsive">
        <table class="orders-table">

          <thead>
            <tr>
              <th>Order ID</th>
              <th>Product</th>
              <th>Qty</th>
              <th>Status</th>
              <th>Feedback</th>
            </tr>
          </thead>

          <tbody>
            <ng-container *ngFor="let o of orders">

              <tr [class.resolved]="o.status === 'CONFIRMED'">
                <td>#{{ o.id }}</td>
                <td>{{ o.product?.name }}</td>
                <td>{{ o.quantity }}</td>

                <td>
                  <span *ngIf="o.status === 'CONFIRMED'" class="status confirmed">
                    Confirmed
                  </span>
                  <span *ngIf="o.status !== 'CONFIRMED'" class="status pending">
                    {{ o.status }}
                  </span>
                </td>

                <td>
                  <div *ngIf="submittedFeedback[o.id]" class="feedback-view">

                    <div class="stars">
                      <i class="bi bi-star-fill"
                         *ngFor="let s of [1,2,3,4,5]"
                         [class.filled]="submittedFeedback[o.id].rating >= s">
                      </i>
                    </div>

                    <small>“{{ submittedFeedback[o.id].comment }}”</small>
                  </div>

                  <button
                    *ngIf="o.status === 'CONFIRMED' && !submittedFeedback[o.id]"
                    class="btn-feedback"
                    (click)="openFeedback(o.id)">
                    Give Feedback
                  </button>

                  <span *ngIf="o.status !== 'CONFIRMED'" class="pending-text">
                    Pending confirmation
                  </span>
                </td>
              </tr>

              <tr *ngIf="activeOrderId === o.id" class="feedback-row">
                <td colspan="5">

                  <div class="feedback-box">

                    <div class="stars mb-2">
                      <i class="bi bi-star-fill"
                         *ngFor="let s of [1,2,3,4,5]"
                         (click)="setRating(o.id, s)"
                         [class.filled]="ratings[o.id] >= s">
                      </i>
                    </div>

                    <textarea
                      class="feedback-input"
                      rows="2"
                      placeholder="Write your review..."
                      [(ngModel)]="comments[o.id]">
                    </textarea>

                    <button class="btn-submit" (click)="submitFeedback(o.id)">
                      Submit Feedback
                    </button>

                  </div>

                </td>
              </tr>

            </ng-container>
          </tbody>

        </table>
      </div>

    </div>

  </div>

</div>
