<div class="container py-5 add-inventory">

  <!-- HEADER -->
  <div class="text-center mb-5">
    <h2 class="fw-bold">Add Inventory</h2>
    <p class="text-muted">
      Select a product and update its stock quantity
    </p>
  </div>

  <!-- PRODUCT LIST -->
  <div class="row mb-5">

    <div class="col-12 mb-3">
      <h5 class="section-title">Select Product</h5>
    </div>

    <div class="col-lg-4 col-md-6 mb-4"
         *ngFor="let product of products">

      <div class="card product-card h-100"
           [class.selected]="selectedProduct?.id === product.id"
           (click)="selectProduct(product)">

        <div class="card-body">

          <h6 class="fw-semibold mb-1">
            {{ product.name }}
          </h6>

          <p class="text-muted small mb-2">
            Price: ₹{{ product.price }}
          </p>

          <span class="badge stock-badge">
            Stock: {{ product.stockQuantity }}
          </span>

        </div>

      </div>

    </div>
  </div>

  <!-- INVENTORY FORM -->
  <div class="row justify-content-center">
    <div class="col-lg-5 col-md-7">

      <div class="card inventory-form-card">
        <div class="card-body p-4">

          <h5 class="mb-3">Inventory Details</h5>

          <div *ngIf="selectedProduct"
               class="alert alert-info small text-center">
            Updating stock for
            <strong>{{ selectedProduct.name }}</strong>
          </div>

          <form [formGroup]="itemForm"
                (ngSubmit)="onSubmit()">

            <div class="mb-3">
              <label class="form-label fw-semibold">
                Stock Quantity
              </label>

              <input
                type="number"
                class="form-control form-control-lg"
                formControlName="stockQuantity"
                placeholder="Enter quantity"
              />

              <small class="text-danger"
                     *ngIf="
                       itemForm.get('stockQuantity')?.touched &&
                       itemForm.get('stockQuantity')?.invalid
                     ">
                Quantity must be greater than 0
              </small>
            </div>

            <div *ngIf="successMessage"
                 class="alert alert-success text-center">
              {{ successMessage }}
            </div>

            <div *ngIf="errorMessage"
                 class="alert alert-danger text-center">
              {{ errorMessage }}
            </div>

            <button
              type="submit"
              class="btn btn-primary w-100 btn-lg"
              [disabled]="loading || !selectedProduct">

              {{ loading ? 'Updating...' : 'Add Inventory' }}

            </button>

          </form>

        </div>
      </div>

    </div>
  </div>

</div>
