<div class="add-inventory-hero">

  <div class="hero-overlay"></div>

  <div class="add-inventory-container">

    <div class="add-inventory-card animate-in">

      <!-- HEADER -->
      <div class="add-inventory-header">
        <div class="icon-wrapper">
          <i class="bi bi-boxes"></i>
        </div>

        <h3>Add Inventory</h3>
        <p>Select a product and update its stock quantity</p>
      </div>

      <!-- PRODUCTS -->
      <div class="products-section">

        <h5 class="section-title">Select Product</h5>

        <div class="products-grid">

          <div
            class="product-card"
            *ngFor="let product of products"
            [class.selected]="selectedProduct?.id === product.id"
            (click)="selectProduct(product)"
          >
            <div class="product-top">
              <h6>{{ product.name }}</h6>
              <!-- <span class="stock-badge">
                Stock: <strong>{{ product.stockQuantity }}</strong>
              </span> -->
            </div>

            <p class="description">
              ₹{{ product.price }}
            </p>
          </div>

        </div>
      </div>

      <!-- FORM -->
      <div class="inventory-form-section">

        <h5>Inventory Details</h5>

        <div *ngIf="selectedProduct" class="selected-info">
          Updating stock for <strong>{{ selectedProduct.name }}</strong>
        </div>

        <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

          <div class="form-group">
            <label>Stock Quantity</label>
            <input
              type="number"
              formControlName="stockQuantity"
              placeholder="Enter quantity"
            />
            <small class="error-text"
                   *ngIf="itemForm.get('stockQuantity')?.touched &&
                          itemForm.get('stockQuantity')?.invalid">
              Quantity must be greater than 0
            </small>
          </div>

          <div *ngIf="successMessage" class="alert-success">
            ✅ {{ successMessage }}
          </div>

          <div *ngIf="errorMessage" class="alert-error">
            {{ errorMessage }}
          </div>

          <button
            type="submit"
            class="submit-btn"
            [disabled]="loading || !selectedProduct">
            {{ loading ? 'Updating…' : 'Add Inventory' }}
          </button>

        </form>

      </div>

    </div>

  </div>

</div>
