<!-- ✅ Modern UI Card with Subtle Gradient Background -->
<div class="container d-flex justify-content-center align-items-center mt-4" 
     style="min-height: 70vh;">

  <div class="p-4 shadow card"
       style="
         max-width: 480px; 
         width: 100%;
         border-radius: 18px;
         background: linear-gradient(135deg, #ffffff 0%, #f7faff 100%);
         box-shadow: 0 8px 28px rgba(0,0,0,0.12);
       ">

    <!-- ✅ Top Icon -->
    <div class="text-center mb-3">
      <img src="https://cdn-icons-png.flaticon.com/512/9187/9187604.png"
           alt="inventory-icon"
           width="65"
           style="opacity: 0.9;" />
    </div>

    <h3 class="text-center mb-4" 
        style="font-weight: 700; font-family: 'Poppins', sans-serif; color: #333;">
      Add Inventory
    </h3>

    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

      <!-- Product ID -->
      <div class="mb-3">
        <label class="form-label" 
               style="font-weight: 600; color: #444; font-family: 'Poppins', sans-serif;">
          Product ID
        </label>

        <input type="number"
               class="form-control"
               formControlName="productId"
               placeholder="Enter Product ID"
               style="
                 border-radius: 10px;
                 padding: 12px;
                 border: 1px solid #ccc;
                 transition: 0.2s;
               ">
      </div>

      <!-- Stock Quantity -->
      <div class="mb-3">
        <label class="form-label" 
               style="font-weight: 600; color: #444; font-family: 'Poppins', sans-serif;">
          Stock Quantity
        </label>

        <input type="number"
               class="form-control"
               formControlName="stockQuantity"
               placeholder="Enter Quantity"
               style="
                 border-radius: 10px;
                 padding: 12px;
                 border: 1px solid #ccc;
               ">
      </div>

      <!-- Error Message -->
      <div *ngIf="message"
           class="alert alert-danger text-center"
           style="border-radius: 10px; font-weight: 500;">
        {{ message }}
      </div>

      <!-- ✅ Animated Submit Button -->
      <button class="btn w-100"
              type="submit"
              [disabled]="itemForm.invalid"
              style="
                background: linear-gradient(90deg, #2f80ed, #56ccf2);
                border: none;
                padding: 12px 0;
                border-radius: 10px;
                font-size: 17px;
                font-weight: 600;
                color: white;
                font-family: 'Poppins', sans-serif;
                transition: transform 0.2s ease;
              "
              onmouseover="this.style.transform='scale(1.03)'"
              onmouseout="this.style.transform='scale(1)'">
        Add Inventory
      </button>

    </form>
  </div>
</div>
