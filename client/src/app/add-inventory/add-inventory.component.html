<div class="container py-4 add-inventory">

  <div class="text-center mb-4">
    <h2 class="fw-bold">Add Inventory</h2>
    <p class="text-muted">Select a product and update stock quantity</p>
  </div>

  <div class="row mb-4">
    <div class="col-12 mb-2">
      <h5>Select Product</h5>
    </div>

    <div class="col-md-4 mb-3"
         *ngFor="let product of products">

      <div class="card product-card"
           [class.selected]="selectedProduct?.id === product.id"
           (click)="selectProduct(product)">

        <div class="card-body">
          <h6 class="fw-semibold">{{ product.name }}</h6>
          <p class="text-muted small mb-1">
            ₹{{ product.price }}
          </p>
          <span class="badge bg-secondary">
            Current Stock: {{ product.stockQuantity }}
          </span>
        </div>

      </div>
    </div>
  </div>

  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-sm">
        <div class="card-body">

          <h5 class="mb-3">Inventory Details</h5>

          <div *ngIf="selectedProduct" class="alert alert-info">
            Updating stock for:
            <strong>{{ selectedProduct.name }}</strong>
          </div>

          <form [formGroup]="itemForm"
                (ngSubmit)="onSubmit()">

            <div class="mb-3">
              <label class="form-label fw-semibold">
                Stock Quantity
              </label>
              <input type="number"
                     class="form-control"
                     formControlName="stockQuantity"
                     placeholder="Enter quantity">

              <small class="text-danger"
                     *ngIf="itemForm.get('stockQuantity')?.touched &&
                            itemForm.get('stockQuantity')?.invalid">
                Quantity must be greater than 0
              </small>
            </div>

            <div *ngIf="successMessage"
                 class="alert alert-success">
              {{ successMessage }}
            </div>

            <div *ngIf="errorMessage"
                 class="alert alert-danger">
              {{ errorMessage }}
            </div>

            <button type="submit"
                    class="btn btn-primary w-100"
                    [disabled]="loading">
              {{ loading ? 'Updating...' : 'Add Inventory' }}
            </button>

          </form>

        </div>
      </div>

    </div>
  </div>

</div>
