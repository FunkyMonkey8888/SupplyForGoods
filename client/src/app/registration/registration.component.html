<div class="registration-page d-flex justify-content-center align-items-center">

  <div class="card registration-card shadow-lg p-4">

    <!-- ✅ ONE icon wrapper only -->
    <div class="registration-icon-wrapper">
      <img
        src="https://cdn-icons-png.flaticon.com/512/747/747376.png"
        alt="User Registration Icon"
        class="registration-icon"
      />
    </div>

    <h3 class="text-center registration-title mt-5 mb-4">
      User Registration
    </h3>

    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input
          type="text"
          formControlName="username"
          class="form-control custom-input"
          placeholder="Enter username"
        />
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input
          type="email"
          formControlName="email"
          class="form-control custom-input"
          placeholder="Enter email"
        />
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input
          type="password"
          formControlName="password"
          class="form-control custom-input"
          placeholder="Enter password"
        />
      </div>

      <!-- Role -->
      <div class="mb-3">
        <label class="form-label">Role</label>
        <select formControlName="role" class="form-select custom-input">
          <option value="" disabled>Select role</option>
          <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
        </select>
      </div>

      <button
        class="btn w-100 register-btn"
        type="submit"
        [disabled]="itemForm.invalid"
      >
        Register
      </button>

    </form>

    <p class="text-center mt-3 login-text">
      Already have an account?
      <a routerLink="/login">Login here</a>
    </p>

  </div>

</div>
