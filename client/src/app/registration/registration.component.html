<div class="container d-flex justify-content-center align-items-center min-vh-100">

  <div class="card registration-card shadow-lg p-4"
       style="max-width: 420px; width: 100%; border-radius: 16px;">

    <!-- ✅ Icon Header -->
    <div class="text-center mb-3">
      <i class="bi bi-person-plus-fill"
         style="font-size: 48px; color: #0d6efd;"></i>
    </div>

    <h3 class="text-center mb-4 fw-bold">Create Your Account</h3>

    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text"
               class="form-control"
               formControlName="username"
               placeholder="Enter username">
        <small class="text-danger"
               *ngIf="itemForm.controls['username'].touched &&
                       itemForm.controls['username'].invalid">
          Username must be at least 3 characters
        </small>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email"
               class="form-control"
               formControlName="email"
               placeholder="Enter email">
        <small class="text-danger"
               *ngIf="itemForm.controls['email'].touched &&
                       itemForm.controls['email'].invalid">
          Enter a valid email address
        </small>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password"
               class="form-control"
               formControlName="password"
               placeholder="Enter password">
        <small class="text-danger"
               *ngIf="itemForm.controls['password'].touched &&
                       itemForm.controls['password'].invalid">
          Password must be at least 6 characters
        </small>
      </div>

      <!-- Role -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Select Role</label>
        <select formControlName="role" class="form-select">
          <option value="" disabled>Select Role</option>
          <option *ngFor="let r of roles" [value]="r">
            {{ r }}
          </option>
        </select>
      </div>

      <!-- Error -->
      <div *ngIf="message" class="alert alert-danger text-center">
        {{ message }}
      </div>

      <!-- Submit -->
      <button class="btn btn-primary w-100"
              type="submit"
              [disabled]="itemForm.invalid || loading">
        <span *ngIf="!loading">
          <i class="bi bi-person-check-fill me-1"></i>
          Register
        </span>
        <span *ngIf="loading">
          Registering...
        </span>
      </button>

    </form>

    <!-- Login Link -->
    <p class="text-center mt-3 mb-0">
      Already have an account?
      <a routerLink="/login" class="fw-semibold">
        Login here
      </a>
    </p>

  </div>
</div>
