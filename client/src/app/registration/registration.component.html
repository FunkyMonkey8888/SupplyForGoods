<div class="registration-container">
  <h2>Register</h2>

  <form [formGroup]="itemForm" (ngSubmit)="onRegister()">

    <div class="form-group">
      <label>Username</label>
      <input type="text" formControlName="username" />
      <small *ngIf="itemForm.get('username')?.touched && itemForm.get('username')?.invalid">
        Username is required
      </small>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email" />
      <small *ngIf="itemForm.get('email')?.touched && itemForm.get('email')?.invalid">
        Valid email is required
      </small>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" formControlName="password" />
      <small *ngIf="itemForm.get('password')?.touched && itemForm.get('password')?.invalid">
        Password is required
      </small>
    </div>

    <div class="form-group">
      <label>Role</label>
      <select formControlName="role">
        <option value="">Select Role</option>
        <option value="MANUFACTURER">Manufacturer</option>
        <option value="WHOLESALER">Wholesaler</option>
        <option value="CONSUMER">Consumer</option>
      </select>
      <small *ngIf="itemForm.get('role')?.touched && itemForm.get('role')?.invalid">
        Role is required
      </small>
    </div>

    <button type="submit">Register</button>
  </form>

  <p class="message" *ngIf="showMessage">
    {{ responseMessage }}
  </p>
</div>
