<div class="registration-hero">

  <div class="registration-overlay"></div>

  <div class="registration-container">

    <div class="registration-card animate-in">

      <div class="registration-icon-wrapper">
        <img
          src="https://cdn-icons-png.flaticon.com/512/747/747376.png"
          alt="User Registration"
          class="registration-icon"
        />
      </div>

      <h3 class="registration-title">User Registration</h3>
      <p class="registration-subtitle">Create your account and get started</p>

      <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

        <div class="field">
          <label class="form-label">Username</label>
          <input
            type="text"
            formControlName="username"
            class="custom-input"
            placeholder="Enter username"
          />
          <small
            class="error-text"
            *ngIf="itemForm.get('username')?.touched &&
                   itemForm.get('username')?.errors?.['required']">
            Username is required
          </small>
        </div>

        <div class="field">
          <label class="form-label">Email</label>
          <input
            type="email"
            formControlName="email"
            class="custom-input"
            placeholder="Enter email"
          />
          <small
            class="error-text"
            *ngIf="itemForm.get('email')?.touched &&
                   itemForm.get('email')?.errors?.['required']">
            Email is required
          </small>
          <small
            class="error-text"
            *ngIf="itemForm.get('email')?.touched &&
                   itemForm.get('email')?.errors?.['email']">
            Enter a valid email address
          </small>
        </div>

        <div class="field">
          <label class="form-label">Password</label>
          <input
            type="password"
            formControlName="password"
            class="custom-input"
            placeholder="Enter password"
          />
          <small
            class="error-text"
            *ngIf="itemForm.get('password')?.touched &&
                   itemForm.get('password')?.errors?.['required']">
            Password is required
          </small>
        </div>

        <div class="field">
          <label class="form-label">Role</label>
          <select formControlName="role" class="custom-input">
            <option value="" disabled>Select role</option>
            <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
          </select>
          <small
            class="error-text"
            *ngIf="itemForm.get('role')?.touched &&
                   itemForm.get('role')?.errors?.['required']">
            Role selection is required
          </small>
        </div>

        <button
          class="register-btn"
          type="submit"
          [disabled]="itemForm.invalid">
          Register
        </button>

      </form>

      <p class="login-text">
        Already have an account?
        <a routerLink="/login">Login here</a>
      </p>

    </div>

  </div>

</div>
