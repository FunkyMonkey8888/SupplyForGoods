<div class="container d-flex justify-content-center align-items-center min-vh-100">

  <div class="card registration-card shadow-lg p-4"
       style="max-width: 420px; width: 100%; border-radius: 16px;">

    <!-- Icon -->
    <div class="text-center mb-3">
      <i class="bi bi-person-plus-fill" style="font-size: 48px; color: #0d6efd;"></i>
    </div>

    <h3 class="text-center mb-4 fw-bold">Create Your Account</h3>

    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input type="text" class="form-control"
               formControlName="username"
               placeholder="Enter username">
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Email</label>
        <input type="email" class="form-control"
               formControlName="email"
               placeholder="Enter email">
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input type="password" class="form-control"
               formControlName="password"
               placeholder="Enter password">
      </div>

      <!-- Role -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Select Role</label>
        <select formControlName="role"
                class="form-select"
                (change)="onRoleChange()">
          <option value="" disabled>Select Role</option>
          <option *ngFor="let r of roles" [value]="r">{{ r }}</option>
        </select>
      </div>

      <!-- ✅ Invite Code (Only for privileged roles) -->
      <div class="mb-3" *ngIf="itemForm.value.role && itemForm.value.role !== 'CONSUMER'">
        <label class="form-label fw-semibold">Invite Code</label>
        <input type="text"
               class="form-control"
               formControlName="inviteCode"
               placeholder="Enter invite code">
      </div>

      <!-- Error -->
      <div *ngIf="message" class="alert alert-danger text-center">
        {{ message }}
      </div>

      <!-- Submit -->
      <button class="btn btn-primary w-100"
              type="submit"
              [disabled]="itemForm.invalid || loading">
        <span *ngIf="!loading">
          <i class="bi bi-person-check-fill me-1"></i>
          Register
        </span>
        <span *ngIf="loading">Registering...</span>
      </button>

    </form>

    <p class="text-center mt-3 mb-0">
      Already have an account?
      <a routerLink="/login" class="fw-semibold">Login here</a>
    </p>

  </div>
</div>
