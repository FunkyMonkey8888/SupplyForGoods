<!-- 🌟 Modern UI for Wholesaler Orders -->
<div class="container py-4"
     style="max-width: 900px; font-family: 'Poppins', sans-serif;">

  <!-- Page Header with Icon -->
  <div class="d-flex align-items-center mb-4">
    <img src="https://cdn-icons-png.flaticon.com/512/3500/3500833.png" 
         width="42" height="42" alt="orders-icon">
    <h2 class="ms-2 mb-0" 
        style="font-weight: 700; color: #2f3542;">
      Wholesaler Orders
    </h2>
  </div>

  <!-- Error message -->
  <div *ngIf="message" 
       class="alert alert-danger"
       style="border-radius: 10px; font-size: 15px; font-weight: 500;">
    {{ message }}
  </div>

  <!-- ✅ Orders Table -->
  <div *ngIf="orders.length > 0" 
       class="card shadow-sm p-3"
       style="
         border-radius: 15px;
         background: linear-gradient(135deg, #ffffff 0%, #f7fbff 100%);
       ">

    <table class="table align-middle"
           style="border-radius: 12px; overflow: hidden;">
      
      <thead style="background: #2f3542; color: white;">
        <tr>
          <th>Order ID</th>
          <th>Quantity</th>
          <th>Status</th>
          <th>Product ID</th>
          <th>User ID</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let o of orders"
            style="transition: 0.2s;"
            onmouseover="this.style.background='#f1f7ff'"
            onmouseout="this.style.background='transparent'">

          <td style="font-weight: 600;">{{ o.id }}</td>
          <td>{{ o.quantity }}</td>

          <!-- ✅ Status Color Badges -->
            <td>
    <span class="badge"
          [ngClass]="{
            'bg-success': o.status === 'CONFIRMED',
            'bg-danger': o.status === 'CANCELLED',
            'bg-warning text-dark': o.status === 'PENDING'
          }">
      {{ o.status }}
    </span>

    <!-- ✅ Waiting for Stock Hint -->
    <div *ngIf="o.status === 'PENDING'"
        class="small text-muted mt-1">
      Waiting for stock
    </div>
  </td>

          <td>{{ o.product?.id }}</td>
          <td>{{ o.user?.id }}</td>
        </tr>
      </tbody>
    </table>

  </div>

  <!-- When no orders exist -->
  <!-- <p *ngIf="orders.length === 0 && !message"
     class="text-muted text-center mt-3"
     style="font-style: italic; font-size: 16px;">
    No orders found.
  </p> -->
  <!-- ✅ Empty State: No Orders for Wholesaler -->
<div *ngIf="orders.length === 0 && !message"
     class="text-center text-muted mt-4">

  <i class="bi bi-inbox" style="font-size: 42px;"></i>
  <p class="fw-semibold mt-2">No orders yet</p>
  <p class="small">
    Consumer orders will appear here once users place orders
    for products you handle.
  </p>
</div>

</div>
