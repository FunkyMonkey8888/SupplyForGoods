<div class="container py-4" style="max-width: 900px; font-family: 'Poppins', sans-serif;">

  <!-- Header -->
  <div class="d-flex align-items-center mb-4">
    <i class="bi bi-receipt-cutoff" style="font-size: 32px;"></i>
    <h2 class="ms-2 mb-0 fw-bold">
      {{ role === 'MANUFACTURER' ? 'Incoming Orders' : 'Orders' }}
    </h2>
  </div>

  <!-- Loading -->
  <div *ngIf="loading" class="alert alert-info">
    Loading orders...
  </div>

  <!-- Error -->
  <div *ngIf="message && !loading" class="alert alert-warning">
    {{ message }}
  </div>

  <!-- Orders Table -->
  <div *ngIf="orders.length > 0 && !loading" class="card shadow-sm p-3">
    <table class="table align-middle">
      <thead class="table-dark">
        <tr>
          <th>Order ID</th>
          <th>Product</th>
          <th>Quantity</th>
          <th>Status</th>

          <th *ngIf="role === 'MANUFACTURER' || role === 'WHOLESALER'">
            Action
          </th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let o of orders">
          <td>{{ o.id }}</td>
          <td>{{ o.product?.name }}</td>
          <td>{{ o.quantity }}</td>

          <td>
            <span class="badge"
              [ngClass]="{
                'bg-success': o.status === 'CONFIRMED',
                'bg-warning text-dark': o.status === 'PENDING',
                'bg-primary': o.status === 'SHIPPED',
                'bg-danger': o.status === 'CANCELLED'
              }">
              {{ o.status }}
            </span>
          </td>

          <td *ngIf="role === 'MANUFACTURER' || role === 'WHOLESALER'">
            <button class="btn btn-sm btn-success me-2"
              (click)="updateStatus(o.id, 'CONFIRMED')"
              [disabled]="o.status !== 'PENDING'">
              Approve
            </button>

            <button class="btn btn-sm btn-danger"
              (click)="updateStatus(o.id, 'CANCELLED')"
              [disabled]="o.status !== 'PENDING'">
              Reject
            </button>
          </td>

        </tr>
      </tbody>
    </table>
  </div>

  <p *ngIf="orders.length === 0 && !loading && !message"
     class="text-muted text-center mt-4">
    No orders found.
  </p>
</div>
