<div class="container mt-4">
  <h2>Orders</h2>

  <table class="table table-bordered">
    <thead>
      <tr>
        <th>Order ID</th>
        <th>Product</th>
        <th>Quantity</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody>
      <tr *ngFor="let o of orderList">
        <td>{{ o.id }}</td>
        <td>{{ o.product?.name }}</td>
        <td>{{ o.quantity }}</td>
        <td>{{ o.status }}</td>
        <td>
          <button
            class="btn btn-sm btn-primary"
            (click)="processOrder(o)"
            [disabled]="getAllowedStatus(o.status).length === 0">
            Update Status
          </button>
        </td>
      </tr>
    </tbody>
  </table>

  <div *ngIf="updateId" class="mt-3">
    <h4>Update Order Status</h4>

    <select class="form-control mb-2" [(ngModel)]="formModel.status">
      <option value="">Select Status</option>
      <option
        *ngFor="let s of getAllowedStatus(orderList.find(o => o.id === updateId)?.status)"
        [value]="s">
        {{ s }}
      </option>
    </select>

    <button class="btn btn-success" (click)="onSubmit()">
      Update
    </button>
  </div>

  <div *ngIf="showMessage" class="alert alert-success mt-3">
    {{ responseMessage }}
  </div>

  <div *ngIf="showError" class="alert alert-danger mt-3">
    {{ errorMessage }}
  </div>
</div>
