<div class="consumer-place-order-hero">

  <div class="hero-overlay"></div>

  <div class="consumer-place-order-container">

    <div class="place-order-card animation-in">

      <div class="place-order-header">
        <div class="icon-wrapper">
          <i class="bi bi-cart-check-fill"></i>
        </div>

        <h3>Place Order</h3>
        <p>Choose a product and specify quantity</p>
      </div>

      <div class="content-grid">

        <!-- PRODUCTS -->
        <div class="products-section">
          <h5 class="section-title">Available Products</h5>

          <div class="products-grid">
            <div
              class="product-card"
              *ngFor="let product of products"
              [class.selected]="selectedProduct?.id === product.id"
              (click)="selectProduct(product)"
            >
              <h6>{{ product.name }}</h6>
              <p class="description">
                {{ product.description || 'No description available' }}
              </p>

              <div class="product-footer">
                <span class="price">₹{{ product.price }}</span>
                <span class="availability">Available</span>
              </div>
            </div>
          </div>
        </div>

        <!-- ORDER FORM -->
        <div class="order-form-section">
          <h5>Order Details</h5>

          <div *ngIf="selectedProduct" class="selected-info">
            Ordering <strong>{{ selectedProduct.name }}</strong>
          </div>

          <form [formGroup]="orderForm" (ngSubmit)="placeOrder()">
            <div class="form-group">
              <label>Quantity</label>
              <input type="number" formControlName="quantity" />
            </div>

            <div class="form-group">
              <label>Status</label>
              <input type="text" formControlName="status" readonly />
            </div>

            <button
              type="submit"
              class="submit-btn"
              [disabled]="loading || !selectedProduct">
              Place Order
            </button>
          </form>
        </div>

      </div>
    </div>

  </div>
</div>
