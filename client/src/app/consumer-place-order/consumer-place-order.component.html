<div class="container py-4 consumer-place-order">

  <!-- Header -->
  <div class="text-center mb-4">
    <h2 class="fw-bold">Place Order</h2>
    <p class="text-muted">
      Select a product and place your order
    </p>
  </div>

  <!-- ================= PRODUCT LIST ================= -->
  <div class="row mb-4">

    <div class="col-12">
      <h5 class="mb-3">Available Products</h5>
    </div>

    <div class="col-md-4 mb-3"
         *ngFor="let product of products">

      <div class="card product-card h-100"
           [class.selected]="selectedProduct?.id === product.id"
           (click)="selectProduct(product)">

        <div class="card-body">

          <h6 class="fw-semibold mb-1">
            {{ product.name }}
          </h6>

          <p class="text-muted small mb-2">
            {{ product.description || 'No description' }}
          </p>

          <div class="d-flex justify-content-between align-items-center">
            <span class="fw-bold">
              ₹{{ product.price }}
            </span>

            <span class="badge bg-info">
              Available
            </span>
          </div>

        </div>
      </div>
    </div>

  </div>

  <!-- ================= ORDER FORM ================= -->
  <div class="row justify-content-center">
    <div class="col-md-6">

      <div class="card shadow-sm">
        <div class="card-body">

          <h5 class="mb-3">Order Details</h5>

          <div *ngIf="selectedProduct" class="alert alert-info">
            Ordering:
            <strong>{{ selectedProduct.name }}</strong>
          </div>

          <form [formGroup]="orderForm"
                (ngSubmit)="placeOrder()">

            <div class="mb-3">
              <label class="form-label fw-semibold">
                Quantity
              </label>

              <input type="number"
                     class="form-control"
                     formControlName="quantity">

              <small class="text-danger"
                     *ngIf="orderForm.get('quantity')?.touched &&
                            orderForm.get('quantity')?.invalid">
                Quantity must be at least 1
              </small>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">
                Status
              </label>

              <input type="text"
                     class="form-control"
                     formControlName="status"
                     readonly>
            </div>

            <div *ngIf="successMessage"
                 class="alert alert-success">
              {{ successMessage }}
            </div>

            <div *ngIf="errorMessage"
                 class="alert alert-danger">
              {{ errorMessage }}
            </div>

            <button type="submit"
                    class="btn btn-primary w-100"
                    [disabled]="loading || !selectedProduct">
              {{ loading ? 'Placing Order…' : 'Place Order' }}
            </button>

          </form>

        </div>
      </div>

    </div>
  </div>

</div>
