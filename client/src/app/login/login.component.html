<div class="container d-flex justify-content-center align-items-center min-vh-100">

  <div class="card login-card shadow-lg p-4"
       style="max-width: 420px; width: 100%; border-radius: 16px;">

    <!-- ✅ Icon Header -->
    <div class="text-center mb-3">
      <i class="bi bi-shield-lock-fill"
         style="font-size: 48px; color: #0d6efd;"></i>
    </div>

    <h3 class="text-center mb-4 fw-bold">Login to Your Account</h3>

    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input
          class="form-control"
          type="text"
          formControlName="username"
          placeholder="Enter username">
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input
          class="form-control"
          type="password"
          formControlName="password"
          placeholder="Enter password">
      </div>

      <!-- Error -->
      <div *ngIf="message" class="alert alert-danger text-center">
        {{ message }}
      </div>

      <!-- Submit -->
      <button
        class="btn btn-primary w-100"
        type="submit"
        [disabled]="itemForm.invalid || loading">

        <span *ngIf="!loading">
          <i class="bi bi-box-arrow-in-right me-1"></i>
          Login
        </span>

        <span *ngIf="loading">
          Logging in…
        </span>
      </button>

    </form>

    <!-- Register Redirect -->
    <p class="text-center mt-3 mb-0">
      Don’t have an account?
      <a routerLink="/registration" class="fw-semibold">
        Register here
      </a>
    </p>

  </div>
</div>
