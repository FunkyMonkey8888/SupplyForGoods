<div class="login-container">

  <h2>SUPPLY-OF-GOODS MANAGEMENT</h2>
  <p>Login to continue</p>

  <form [formGroup]="itemForm" (ngSubmit)="onLogin()">

    <div class="form-group">
      <label>Username</label>
      <input type="text" formControlName="username" />
      <small *ngIf="itemForm.get('username')?.touched && itemForm.get('username')?.invalid">
        Username is required
      </small>
    </div>

    <div class="form-group">
      <label>Password</label>
      <input type="password" formControlName="password" />
      <small *ngIf="itemForm.get('password')?.touched && itemForm.get('password')?.invalid">
        Password is required
      </small>
    </div>

    <button type="submit">Login</button>

  </form>

  <p class="error" *ngIf="showError">
    {{ errorMessage }}
  </p>

  <p class="register">
    New user?  
    <span (click)="registration()">Register here</span>
  </p>
</div>
