<div class="login-hero">

  <div class="login-overlay"></div>

  <div class="login-container">

    <div class="login-card animate-in">

      <!-- Icon -->
      <div class="login-icon">
        <i class="bi bi-person-circle"></i>
      </div>

      <h3 class="login-title">Login</h3>
      <p class="login-subtitle">Access your dashboard</p>

      <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

        <!-- Username -->
        <div class="form-group">
          <label>Username</label>
          <input
            type="text"
            class="custom-input"
            formControlName="username"
            placeholder="Enter username"
          />

          <small
            *ngIf="itemForm.controls['username'].touched && itemForm.controls['username'].errors?.['required']"
            class="error-text"
          >
            Username is required
          </small>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label>Password</label>
          <input
            type="password"
            class="custom-input"
            formControlName="password"
            placeholder="Enter password"
          />

          <small
            *ngIf="itemForm.controls['password'].touched && itemForm.controls['password'].errors?.['required']"
            class="error-text"
          >
            Password is required
          </small>
        </div>

        <!-- Backend error -->
        <div *ngIf="message" class="login-alert">
          {{ message }}
        </div>

        <!-- Button -->
        <button
          type="submit"
          class="login-btn"
          [disabled]="itemForm.invalid"
        >
          Login
        </button>

      </form>

      <p class="login-footer">
        Don’t have an account?
        <a routerLink="/registration">Register here</a>
      </p>

    </div>

  </div>

</div>
