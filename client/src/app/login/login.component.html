<div class="container d-flex justify-content-center align-items-center mt-5"
     style="min-height: 75vh; font-family: 'Poppins', sans-serif;">

  <div class="card shadow-lg p-4"
       style="
         max-width: 450px;
         width: 100%;
         border-radius: 18px;
         background: linear-gradient(135deg, #ffffff 0%, #f2f7ff 100%);
         box-shadow: 0 10px 30px rgba(0,0,0,0.12);
       ">
       
    <!-- 🔐 Stylish Login Icon -->
    <div class="text-center mb-3">
      <img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png"
           width="70" height="70">
    </div>

    <h3 class="text-center mb-4"
        style="font-weight: 700; color: #2f3542;">
      Login
    </h3>

    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

      <!-- ✅ Username -->
      <div class="mb-3">
        <label class="form-label" style="font-weight: 600;">Username</label>
        <input class="form-control"
               type="text"
               formControlName="username"
               placeholder="Enter username"
               style="
                 height: 44px;
                 padding: 10px;
                 border-radius: 10px;
                 border: 1px solid #ccc;
                 transition: 0.25s;
               "
               onfocus="this.style.borderColor='#4e8cff'">
      </div>

      <!-- ✅ Password -->
      <div class="mb-3">
        <label class="form-label" style="font-weight: 600;">Password</label>
        <input class="form-control"
               type="password"
               formControlName="password"
               placeholder="Enter password"
               style="
                 height: 44px;
                 padding: 10px;
                 border-radius: 10px;
                 border: 1px solid #ccc;
               "
               onfocus="this.style.borderColor='#4e8cff'">
      </div>

      <!-- ❌ Error Message -->
      <div *ngIf="message"
           class="alert alert-danger text-center"
           style="border-radius: 10px; font-weight: 500;">
        {{ message }}
      </div>

      <!-- ✅ Modern Submit Button -->
      <button 
        class="btn w-100"
        type="submit"
        [disabled]="itemForm.invalid"
        style="
          background: linear-gradient(90deg, #4e8cff, #77b5ff);
          border: none;
          padding: 12px;
          border-radius: 10px;
          color: white;
          font-size: 17px;
          font-weight: 600;
          transition: 0.25s;
        "
        onmouseover="this.style.transform='scale(1.03)'"
        onmouseout="this.style.transform='scale(1)'">
        Login
      </button>

    </form>

    <p class="text-center mt-3"
       style="font-size: 14px;">
      Don't have an account? 
      <a routerLink="/registration" style="font-weight: 600; color: #1e90ff;">
        Register here
      </a>
    </p>

  </div>

</div>
