<div class="container d-flex justify-content-center align-items-center min-vh-100">
  <div class="card login-card shadow-lg">

    <!-- Icon -->
    <div class="text-center mb-3">
      <img src="https://cdn-icons-png.flaticon.com/512/3064/3064197.png"
           width="70" height="70">
    </div>

    <h3 class="text-center mb-4 fw-bold">Login</h3>

    <form [formGroup]="itemForm" (ngSubmit)="onSubmit()">

      <!-- Username -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Username</label>
        <input
          class="form-control"
          type="text"
          formControlName="username"
          placeholder="Enter username">
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label fw-semibold">Password</label>
        <input
          class="form-control"
          type="password"
          formControlName="password"
          placeholder="Enter password">
      </div>

      <!-- Error -->
      <div *ngIf="message" class="alert alert-danger text-center">
        {{ message }}
      </div>

      <!-- Button -->
      <button
        class="btn btn-primary w-100"
        type="submit"
        [disabled]="itemForm.invalid || loading">

        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading">Logging in…</span>
      </button>

    </form>

    <p class="text-center mt-3">
      Don’t have an account?
      <a routerLink="/registration" class="fw-semibold">Register here</a>
    </p>

  </div>
</div>
