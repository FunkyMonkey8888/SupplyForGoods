<div class="nf-hero">
  <div class="nf-overlay"></div>

  <div class="nf-container">
    <div class="nf-card animate-in">

      <div class="nf-code">404</div>

      <h2 class="nf-title">Page Not Found</h2>
      <p class="nf-text">
        The page you’re looking for doesn’t exist or was moved.
      </p>

      <div class="nf-actions">
        <button class="btn btn-primary" (click)="goBack()">Go Back</button>
        <button class="btn btn-outline-light" (click)="goDashboard()">Dashboard</button>
        <button class="btn btn-outline-warning" (click)="goLogin()">Login</button>
      </div>

    </div>
  </div>
</div>
